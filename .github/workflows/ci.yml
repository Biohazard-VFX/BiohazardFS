name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  linux:
    name: Linux full suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check
        run: cargo check --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

      - name: Whitespace
        run: git diff-tree --check --root -r HEAD

      - name: Dependency, license, and advisory policy
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Electron install
        run: pnpm --dir apps/workspace-electron install --frozen-lockfile

      - name: Electron static analysis
        run: pnpm --dir apps/workspace-electron run static

      - name: Electron build
        run: pnpm --dir apps/workspace-electron run build

      - name: Install Linux static/smoke dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck xvfb

      - name: ShellCheck
        run: shellcheck scripts/ci/*.sh

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/docker/server/Dockerfile

      - name: Server smoke
        run: bash scripts/ci/server-smoke.sh

      - name: Server DB smoke
        run: bash scripts/ci/server-db-smoke.sh

      - name: Object store smoke
        run: bash scripts/ci/object-store-smoke.sh

      - name: Server transfer smoke
        run: bash scripts/ci/server-transfer-smoke.sh

      - name: Docker server image build
        run: docker build -f deploy/docker/server/Dockerfile -t biohazardfs-server:ci .

      - name: Compose config
        run: docker compose -f deploy/compose/dev/docker-compose.yml config --quiet

      - name: Client smoke
        env:
          BIOHAZARDFS_SKIP_ELECTRON_BUILD: "1"
        run: bash scripts/ci/client-smoke.sh

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/biohazardfs --set secrets.existingSecret=biohazardfs-secret

      - name: Helm template
        run: helm template biohazardfs deploy/helm/biohazardfs --set secrets.existingSecret=biohazardfs-secret >/tmp/biohazardfs-helm.yaml

  cross-platform:
    name: ${{ matrix.os }} check/test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features
