name: server-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (default 0.1.0-dev)"
        required: false
        default: "0.1.0-dev"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_USER || github.actor }}
          # Prefer a PAT with write:packages (secret CR_PAT) when present; the
          # in-workflow GITHUB_TOKEN is used as a fallback.
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: echo "name=ghcr.io/biohazard-vfx/biohazardfs-server:${{ github.event.inputs.tag || '0.1.0-dev' }}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.name }}
            ghcr.io/biohazard-vfx/biohazardfs-server:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
