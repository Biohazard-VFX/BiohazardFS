{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "biohazardfs.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: {{ include "biohazardfs.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "biohazardfs.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "biohazardfs.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["worker"]
          env:
            - name: BIOHAZARDFS_LOG
              value: {{ .Values.config.log | quote }}
            - name: BIOHAZARDFS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.existingSecret is required" .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.databaseUrlKey | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
