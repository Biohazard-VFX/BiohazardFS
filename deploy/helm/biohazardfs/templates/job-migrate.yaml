apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "biohazardfs.fullname" . }}-migrate
  labels:
    app.kubernetes.io/name: {{ include "biohazardfs.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "biohazardfs.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            - name: BIOHAZARDFS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.existingSecret is required" .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.databaseUrlKey | quote }}
