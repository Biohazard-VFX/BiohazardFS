services:
  server:
    build:
      context: ../../..
      dockerfile: deploy/docker/server/Dockerfile
    command: ["serve", "--addr", "0.0.0.0:8080"]
    environment:
      BIOHAZARDFS_SERVER_PUBLIC_URL: http://localhost:8080
      BIOHAZARDFS_LOG: debug
      BIOHAZARDFS_DATABASE_URL: postgres://biohazardfs:biohazardfs-dev-password@postgres:5432/biohazardfs?sslmode=disable
      BIOHAZARDFS_OBJECT_STORE_PROVIDER: rustfs
      BIOHAZARDFS_OBJECT_STORE_ENDPOINT: http://object-store:9000
      BIOHAZARDFS_OBJECT_STORE_BUCKET: biohazardfs-dev
      BIOHAZARDFS_OBJECT_STORE_ACCESS_KEY_ID: biohazardfs
      BIOHAZARDFS_OBJECT_STORE_SECRET_ACCESS_KEY: biohazardfs-dev-password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_started
      object-store:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: biohazardfs
      POSTGRES_USER: biohazardfs
      POSTGRES_PASSWORD: biohazardfs-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  object-store:
    image: rustfs/rustfs:1.0.0-beta.8
    command: ["--address", ":9000", "--console-enable", "/data"]
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: biohazardfs
      RUSTFS_SECRET_KEY: biohazardfs-dev-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object-data:/data

volumes:
  postgres-data:
  object-data:
