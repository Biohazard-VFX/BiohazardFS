services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: biohazardfs
      POSTGRES_USER: biohazardfs
      POSTGRES_PASSWORD: biohazardfs-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  object-store:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: biohazardfs
      MINIO_ROOT_PASSWORD: biohazardfs-dev-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object-data:/data

volumes:
  postgres-data:
  object-data:
